name: AWS OIDC Demo Pipeline

on:
  push:
    branches:
      - main

permissions:
  id-token: write      # REQUIRED for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🔐 Configure AWS using OIDC (NO secrets needed)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::<account-id>:role/github-role
          role-session-name: github-actions-session
          aws-region: us-east-1

      # ✅ Verify role assumption
      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      # 📦 Example: List S3 Buckets
      - name: List S3 Buckets
        run: aws s3 ls

      # 🐳 Example: Login to ECR (optional)
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region us-east-1 \
          | docker login --username AWS --password-stdin <account-id>.dkr.ecr.us-east-1.amazonaws.com

      # 🚀 Example: Build & Push Docker Image (optional)
      - name: Build Docker Image
        run: docker build -t my-app .

      - name: Tag Image
        run: docker tag my-app:latest <account-id>.dkr.ecr.us-east-1.amazonaws.com/my-app:latest

      - name: Push Image to ECR
        run: docker push <account-id>.dkr.ecr.us-east-1.amazonaws.com/my-app:latest
