name: DevSecOps Pipeline

on:
push:
branches: ["main"]

env:
AWS_REGION: us-east-1
ECR_REPOSITORY: devsecops-app
IMAGE_TAG: latest

jobs:
build-deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v4
    with:
      python-version: '3.11'

  - name: Install dependencies
    run: pip install -r app/requirements.txt

  # -----------------------------
  # SonarCloud Scan
  # -----------------------------
  - name: Sonar Scan
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    run: |
      sonar-scanner \
        -Dsonar.projectKey=Neerjara_AWS_DevSecOps_Platform \
        -Dsonar.organization=neerjara \
        -Dsonar.sources=. \
        -Dsonar.host.url=https://sonarcloud.io \
        -Dsonar.login=$SONAR_TOKEN

  # -----------------------------
  # Configure AWS
  # -----------------------------
  - name: Configure AWS Credentials
    uses: aws-actions/configure-aws-credentials@v4
    with:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-region: ${{ env.AWS_REGION }}

  # -----------------------------
  # Login to ECR
  # -----------------------------
  - name: Login to ECR
    uses: aws-actions/amazon-ecr-login@v2

  # -----------------------------
  # Build Docker Image
  # -----------------------------
  - name: Build Docker Image
    run: |
      docker build -t $ECR_REPOSITORY:$IMAGE_TAG ./app

  # -----------------------------
  # Tag Image
  # -----------------------------
  - name: Tag Image
    run: |
      docker tag $ECR_REPOSITORY:$IMAGE_TAG \
      ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG

  # -----------------------------
  # Trivy Scan
  # -----------------------------
  - name: Trivy Scan
    run: bash security/trivy-scan.sh $ECR_REPOSITORY:$IMAGE_TAG

  # -----------------------------
  # Push to ECR
  # -----------------------------
  - name: Push to ECR
    run: |
      docker push ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG

  # -----------------------------
  # Deploy to EKS
  # -----------------------------
  - name: Deploy to EKS
    run: |
      aws eks update-kubeconfig --region $AWS_REGION --name devsecops-cluster
      kubectl apply -f k8s/
```
