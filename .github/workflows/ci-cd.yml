name: DevSecOps Pipeline

on:
push:
branches:
- main

env:
AWS_REGION: us-east-1
ECR_REPOSITORY: devsecops-app
IMAGE_TAG: latest

jobs:
build-deploy:
runs-on: [self-hosted, linux, x64]
steps:
  - uses: actions/checkout@v4

  # -----------------------------
  # Install dependencies
  # -----------------------------
  - name: Install Python dependencies
    run: pip3 install -r app/requirements.txt

  # -----------------------------
  # SonarCloud
  # -----------------------------
  - name: Install Sonar Scanner
    run: npm install -g sonar-scanner

  - name: Sonar Scan
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    run: sonar-scanner -Dsonar.projectKey=Neerjara_AWS_DevSecOps_Platform -Dsonar.organization=neerjara -Dsonar.sources=. -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=$SONAR_TOKEN

  # -----------------------------
  # Login to ECR (uses IAM role)
  # -----------------------------
  - name: Login to ECR
    run: |
      ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

  # -----------------------------
  # Build Docker Image
  # -----------------------------
  - name: Build Docker Image
    run: docker build -t $ECR_REPOSITORY:$IMAGE_TAG ./app

  # -----------------------------
  # Tag Docker Image
  # -----------------------------
  - name: Tag Docker Image
    run: |
      ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      docker tag $ECR_REPOSITORY:$IMAGE_TAG $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

  # -----------------------------
  # Install Trivy (if not installed)
  # -----------------------------
  - name: Install Trivy
    run: sudo dnf install -y trivy || true

  # -----------------------------
  # Trivy Scan
  # -----------------------------
  - name: Trivy Scan
    run: trivy image --severity HIGH,CRITICAL --exit-code 0 $ECR_REPOSITORY:$IMAGE_TAG

  # -----------------------------
  # Push to ECR
  # -----------------------------
  - name: Push to ECR
    run: |
      ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      docker push $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

  # -----------------------------
  # Deploy to EKS
  # -----------------------------
  - name: Deploy to EKS
    run: |
      aws eks update-kubeconfig --region $AWS_REGION --name devsecops-cluster
      kubectl apply -f k8s/


